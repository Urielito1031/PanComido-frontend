<div class="mis-mesas-page">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Mis Mesas</h1>
    <button class="btn btn-outline-primary" (click)="toggleMostrarTodas()">
      {{ mostrarTodasLasMesas() ? 'Ver solo mis mesas' : 'Ver todas las mesas' }}
    </button>
  </div>

  <!-- Mapa de mesas reutilizado (sin drag & drop) -->
  <app-mapa-mesas-readonly
    altura="900px"
    [filtroMozoId]="filtroMozoActivo()"
    (onOcuparMesa)="onOcuparMesa($event)"
    (onVerDetalles)="onVerDetalles($event)"
    (onMesaSeleccionada)="onMesaSeleccionada($event)"
  />

  <!-- Modal: Ocupar Mesa -->
  @if (mostrarModalOcupar()) {
    <div class="modal-overlay" (click)="cerrarModalOcupar()">
      <div class="modal-content" (click)="$event.stopPropagation()">
        <h2>Ocupar Mesa</h2>
        <p>Mesa N° {{ mesaSeleccionadaId() }}</p>

        <div class="campo">
          <label>Cantidad de comensales</label>
          <input type="number"
                 [value]="cantidadComensales()"
                 (input)="cantidadComensales.set(+$any($event.target).value)"
                 min="1" max="20">
        </div>

        <div class="modal-actions">
          <button class="btn-cancelar" (click)="cerrarModalOcupar()">Cancelar</button>
          <button class="btn-confirmar" (click)="confirmarOcupar()">Confirmar</button>
        </div>
      </div>
    </div>
  }

  <!-- Modal: Comanda / Detalles -->
  @if (mostrarModalComanda()) {
    <div class="modal-overlay" (click)="cerrarModalComanda()">
      <div class="modal-content modal-comanda p-0" (click)="$event.stopPropagation()">
        @if (comandaCargada()) {
          <app-comanda-detalle-ui
            [comensales]="comandaCargada().cantComensales"
            [mesa]="comandaCargada().numeroDeMesa"
            [items]="comandaCargada().items"
            [total]="calcularTotalComanda(comandaCargada().items)"
            (cerrar)="cerrarModalComanda()"
            (cobrar)="cerrarModalComanda()"
            (cerrarMesa)="cerrarMesaComanda()"
          ></app-comanda-detalle-ui>
        }
      </div>
    </div>
  }
</div>
