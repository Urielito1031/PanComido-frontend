<nav class="mozo-tabs">
  @for (tab of tabs; track tab.route) {
    <a
      [routerLink]="['/staff/mozo', tab.route]"
      routerLinkActive="active"
      class="tab-item"
      [class.active]="isActive(tab.route)">
      {{ tab.label }}
      @if (tab.route === 'llamados' && cantidadPendientes() > 0) {
        <span class="badge">{{ cantidadPendientes() }}</span>
      }
    </a>
  }
</nav>
