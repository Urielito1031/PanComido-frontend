<div [ngClass]="clases()">
  <div class="icon-box">
    <fa-icon [icon]="iconoCategoria()" size="2x" />
  </div>

  <!-- Contenido central -->
  <div class="content-box">
    <div class="titulo-fila">
      <h3>{{ titulo() }}</h3>
      @if (nuevo()) {
        <span class="badge-nuevo">NUEVO</span>
      }
    </div>

    @if (llamado().categoriaDescripcion) {
      <span class="badge-categoria">{{ llamado().categoriaDescripcion }}</span>
    }

    <p>{{ llamado().descripcion || 'Sin descripción' }}</p>
  </div>

  <div class="action-box">
    <button
      class="btn-resolver"
      [disabled]="resolviendo()"
      (click)="resolver.emit(llamado().id)"
      [attr.aria-label]="'Marcar como resuelto'">
      <fa-icon
        [icon]="iconoAccion()"
        [class.fa-spin]="resolviendo()">
      </fa-icon>
    </button>
  </div>
</div>
