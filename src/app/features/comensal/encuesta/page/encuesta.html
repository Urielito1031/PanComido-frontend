<div class="encuesta-container">
  <h2>Encuesta de satisfacción</h2>

  <div class="pregunta">
    <label>1. ¿Cómo calificarías la calidad de la comida?</label>
    <select [(ngModel)]="encuesta.comida">
      <option value="">Seleccionar</option>
      <option value="1">Muy mala</option>
      <option value="2">Mala</option>
      <option value="3">Regular</option>
      <option value="4">Buena</option>
      <option value="5">Excelente</option>
    </select>
  </div>

  <div class="pregunta">
    <label>2. ¿Cómo fue la atención recibida?</label>
    <select [(ngModel)]="encuesta.atencion">
      <option value="">Seleccionar</option>
      <option value="1">Muy mala</option>
      <option value="2">Mala</option>
      <option value="3">Regular</option>
      <option value="4">Buena</option>
      <option value="5">Excelente</option>
    </select>
  </div>

  <div class="pregunta">
    <label>3. ¿Recomendarías el restaurante?</label>

    <div>
      <label>
        <input type="radio" name="recomendaria" value="Si" [(ngModel)]="encuesta.recomendaria">
        Sí
      </label>

      <label>
        <input type="radio" name="recomendaria" value="Tal vez" [(ngModel)]="encuesta.recomendaria">
        Tal vez
      </label>

      <label>
        <input type="radio" name="recomendaria" value="No" [(ngModel)]="encuesta.recomendaria">
        No
      </label>
    </div>
  </div>

  <button (click)="enviarEncuesta()">
    Enviar
  </button>
</div>
