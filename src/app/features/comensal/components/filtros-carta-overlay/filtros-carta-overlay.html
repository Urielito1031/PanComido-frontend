<div class="filtros-overlay" (click)="cerrar.emit()">
  <div class="filtros-panel" (click)="$event.stopPropagation()">
    
    <header class="filtros-header">
      <div class="header-title">
        <span class="material-symbols-outlined filter-icon">filter_alt</span>
        <h2 class="filtros-titulo">Filtros</h2>
        @if (cantidadFiltrosActivos() > 0) {
          <span class="badge-filtros">{{ cantidadFiltrosActivos() }}</span>
        }
      </div>
      <button class="btn-cerrar" (click)="cerrar.emit()">
        <span class="material-symbols-outlined font-weight-bold">close</span>
      </button>
    </header>

    <div class="filtros-content">
      
      <div class="categoria-section">
        <button class="categoria-header" (click)="toggleSeccion('platos')">
          <div class="categoria-info">
            <span class="material-symbols-outlined categoria-icono">room_service</span>
            <span class="categoria-nombre">Platos</span>
          </div>
          <span class="material-symbols-outlined chevron" [class.rotado]="!seccionPlatosAbierta()">
            expand_more
          </span>
        </button>

        @if (seccionPlatosAbierta()) {
          <div class="subcategorias-list">
            <label class="checkbox-item">
              <input type="checkbox" 
                     [checked]="tiposSeleccionados().includes('Plato')"
                     (change)="toggleTipo.emit('Plato')">
              <span class="checkbox-label">Todos los platos</span>
            </label>
          </div>
        }
        <div class="divider"></div>
      </div>

      <div class="categoria-section">
        <button class="categoria-header" (click)="toggleSeccion('bebidas')">
          <div class="categoria-info">
            <span class="material-symbols-outlined categoria-icono">local_drink</span>
            <span class="categoria-nombre">Bebidas</span>
          </div>
          <span class="material-symbols-outlined chevron" [class.rotado]="!seccionBebidasAbierta()">
            expand_more
          </span>
        </button>

        @if (seccionBebidasAbierta()) {
          <div class="subcategorias-list">
            <label class="checkbox-item">
              <input type="checkbox"
                     [checked]="tiposSeleccionados().includes('Bebida')"
                     (change)="toggleTipo.emit('Bebida')">
              <span class="checkbox-label">Todas las bebidas</span>
            </label>
          </div>
        }
        <div class="divider"></div>
      </div>

    </div>

    <div class="actions-footer">
      @if (tieneFiltrosActivos()) {
        <button class="btn-limpiar" (click)="limpiarFiltros()">
          Limpiar filtros
        </button>
      }
      <button class="btn-aplicar-amarillo" (click)="aplicarFiltros()">
        Aplicar filtros
      </button>
    </div>

  </div>
</div>
