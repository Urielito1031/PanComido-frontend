<div class="filtros-overlay" (click)="cerrar.emit()">
  <div class="filtros-panel" (click)="$event.stopPropagation()">

    <header class="filtros-header">
      <div class="header-title">
        <span class="material-symbols-outlined filter-icon">filter_alt</span>
        <h2 class="filtros-titulo">Filtros</h2>
        @if (cartaState.cantidadFiltrosActivos() > 0) {
        <span class="badge-filtros">{{ cartaState.cantidadFiltrosActivos() }}</span>
        }
      </div>
      <button class="btn-cerrar" (click)="cerrar.emit()">
        <span class="material-symbols-outlined font-weight-bold">close</span>
      </button>
    </header>

    <div class="filtros-content">

      <div class="categoria-section">
        <button class="categoria-header" (click)="toggleSeccion('platos')">
          <div class="categoria-info">
            <span class="material-symbols-outlined categoria-icono">room_service</span>
            <span class="categoria-nombre">Platos</span>
          </div>
          <span class="material-symbols-outlined chevron" [class.rotado]="!seccionPlatosAbierta()">
            expand_more
          </span>
        </button>

        <!-- @if (seccionPlatosAbierta()) {
        <div class="subcategorias-list">
          <label class="checkbox-item">
            <input type="checkbox" [checked]="cartaState.tiposSeleccionados().includes('Plato')"
              (change)="cartaState.toggleTipoPlato('Plato')">
            <span class="checkbox-label">Todos los platos</span>
          </label>
        </div>
        } -->
        @if (seccionPlatosAbierta()) {
  <div class="subcategorias-list">
<label class="checkbox-item">
            <input type="checkbox" [checked]="cartaState.tiposSeleccionados().includes('Plato')"
              (change)="cartaState.toggleTipoPlato('Plato')">
            <span class="checkbox-label">Todos los platos</span>
          </label>
    <label class="checkbox-item">
      <input
        type="checkbox"
        [checked]="cartaState.categoriasSeleccionadas().includes('Entrada')"
        (change)="cartaState.toggleCategoria('Entrada')">
      <span class="checkbox-label">Entrada</span>
    </label>

    <label class="checkbox-item">
      <input
        type="checkbox"
        [checked]="cartaState.categoriasSeleccionadas().includes('Principal')"
        (change)="cartaState.toggleCategoria('Principal')">
      <span class="checkbox-label">Principal</span>
    </label>

    <label class="checkbox-item">
      <input
        type="checkbox"
        [checked]="cartaState.categoriasSeleccionadas().includes('Postre')"
        (change)="cartaState.toggleCategoria('Postre')">
      <span class="checkbox-label">Postre</span>
    </label>

        <label class="checkbox-item">
      <input
        type="checkbox"
        [checked]="cartaState.categoriasSeleccionadas().includes('Guarnicion')"
        (change)="cartaState.toggleCategoria('Guarnicion')">
      <span class="checkbox-label">Guarnición</span>
    </label>

  </div>
}
<div class="divider"></div>
        <div class="divider"></div>
      </div>

      <div class="categoria-section">
        <button class="categoria-header" (click)="toggleSeccion('bebidas')">
          <div class="categoria-info">
            <span class="material-symbols-outlined categoria-icono">local_drink</span>
            <span class="categoria-nombre">Bebidas</span>
          </div>
          <span class="material-symbols-outlined chevron" [class.rotado]="!seccionBebidasAbierta()">
            expand_more
          </span>
        </button>

        @if (seccionBebidasAbierta()) {
        <div class="subcategorias-list">
          <label class="checkbox-item">
            <input type="checkbox" [checked]="cartaState.tiposSeleccionados().includes('Bebida')"
              (change)="cartaState.toggleTipoPlato('Bebida')">
            <span class="checkbox-label">Todas las bebidas</span>
          </label>
          <label class="checkbox-item">
  <input
    type="checkbox"
    [checked]="cartaState.categoriasSeleccionadas().includes('Con alcohol')"
    (change)="cartaState.toggleCategoria('Con alcohol')">
  <span class="checkbox-label">Con alcohol</span>
</label>

<label class="checkbox-item">
  <input
    type="checkbox"
    [checked]="cartaState.categoriasSeleccionadas().includes('Sin alcohol')"
    (change)="cartaState.toggleCategoria('Sin alcohol')">
  <span class="checkbox-label">Sin alcohol</span>
</label>
        </div>
        }
        <div class="divider"></div>
      </div>

      <div class="categoria-section">
        <button class="categoria-header" (click)="toggleSeccion('restricciones')">
          <div class="categoria-info">
            <span class="material-symbols-outlined categoria-icono">no_meals</span>
            <span class="categoria-nombre">Restricciones</span>
          </div>
          <span class="material-symbols-outlined chevron" [class.rotado]="!seccionRestriccionesAbierta()">
            expand_more
          </span>
        </button>

        @if (seccionRestriccionesAbierta()) {
        <div class="subcategorias-list">
          <label class="checkbox-item">
            <input type="checkbox" [checked]="cartaState.tiposSeleccionados().includes('Restriccion')"
              (change)="cartaState.toggleTipoPlato('Restriccion')">
            <span class="checkbox-label">Todas las restricciones</span>
            
          </label>
          <label class="checkbox-item">
  <input
    type="checkbox"
    [checked]="cartaState.restriccionesSeleccionadas().includes('Vegetariano')"
    (change)="cartaState.toggleRestriccion('Vegetariano')">
  <span class="checkbox-label">Vegetariano</span>
</label>

<label class="checkbox-item">
  <input
    type="checkbox"
    [checked]="cartaState.restriccionesSeleccionadas().includes('Vegano')"
    (change)="cartaState.toggleRestriccion('Vegano')">
  <span class="checkbox-label">Vegano</span>
</label>

<label class="checkbox-item">
  <input
    type="checkbox"
    [checked]="cartaState.restriccionesSeleccionadas().includes('Sin TACC')"
    (change)="cartaState.toggleRestriccion('Sin TACC')">
  <span class="checkbox-label">Sin TACC</span>
</label>
        </div>
        }
        <div class="divider"></div>
      </div>


    </div>

    <div class="actions-footer">
      @if (cartaState.tieneFiltrosActivos()) {
      <button class="btn-limpiar" (click)="limpiarFiltros()">
        Limpiar filtros
      </button>
      }
      <app-boton variante="success" (click)="aplicarFiltros()">
        Aplicar filtros
      </app-boton>
    </div>

  </div>
</div>
