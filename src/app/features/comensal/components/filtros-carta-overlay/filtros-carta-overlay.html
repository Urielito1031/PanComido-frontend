<div class="filtros-overlay" (click)="cerrar.emit()">
  <div class="filtros-panel" (click)="$event.stopPropagation()">
    <!-- Header -->
    <header class="filtros-header">
      <span class="material-symbols-outlined filter-icon">filter_alt</span>
      <h2 class="filtros-titulo">Filtros</h2>
      <button class="btn-cerrar" (click)="cerrar.emit()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </header>

    <!-- Filtros -->
    <div class="filtros-content">
      <!-- TIPO -->
      <div class="categoria-section">
        <div class="categoria-header">
          <div class="categoria-info">
            <span class="material-symbols-outlined categoria-icono">restaurant</span>
            <span class="categoria-nombre">Tipo</span>
          </div>
        </div>

        <div class="subcategorias-list">
          <label class="checkbox-item">
            <input 
              type="checkbox" 
              [checked]="cartaState.tiposSeleccionados().includes('Plato')"
              (change)="cartaState.toggleTipoPlato('Plato')">
            <span class="checkbox-label">Platos</span>
          </label>
          <label class="checkbox-item">
            <input 
              type="checkbox" 
              [checked]="cartaState.tiposSeleccionados().includes('Bebida')"
              (change)="cartaState.toggleTipoPlato('Bebida')">
            <span class="checkbox-label">Bebidas</span>
          </label>
        </div>
        <div class="divider"></div>
      </div>

      <!-- Ordenamiento -->
      <div class="categoria-section">
        <div class="categoria-header">
          <div class="categoria-info">
            <span class="material-symbols-outlined categoria-icono">sort</span>
            <span class="categoria-nombre">Ordenar por</span>
          </div>
        </div>

        <div class="subcategorias-list">
          <label class="checkbox-item">
            <input 
              type="radio" 
              name="orden"
              value=""
              [checked]="cartaState.ordenarPor() === ''"
              (change)="cartaState.setOrdenar('')">
            <span class="checkbox-label">Sin orden</span>
          </label>
          <label class="checkbox-item">
            <input 
              type="radio" 
              name="orden"
              value="precio-menor"
              [checked]="cartaState.ordenarPor() === 'precio-menor'"
              (change)="cartaState.setOrdenar('precio-menor')">
            <span class="checkbox-label">Precio: menor a mayor</span>
          </label>
          <label class="checkbox-item">
            <input 
              type="radio" 
              name="orden"
              value="precio-mayor"
              [checked]="cartaState.ordenarPor() === 'precio-mayor'"
              (change)="cartaState.setOrdenar('precio-mayor')">
            <span class="checkbox-label">Precio: mayor a menor</span>
          </label>
          <label class="checkbox-item">
            <input 
              type="radio" 
              name="orden"
              value="nombre"
              [checked]="cartaState.ordenarPor() === 'nombre'"
              (change)="cartaState.setOrdenar('nombre')">
            <span class="checkbox-label">Nombre (A-Z)</span>
          </label>
        </div>
        <div class="divider"></div>
      </div>

      <!-- Boton Limpiar Filtros -->
      <div class="actions-footer">
        <button class="btn-limpiar" (click)="limpiarFiltros()">
          Limpiar filtros
        </button>
      </div>
    </div>
  </div>
</div>
