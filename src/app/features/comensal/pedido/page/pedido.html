<div class="container-fluid p-3 bg-light min-vh-100">

  <!-- VOLVER -->
  <div
    class="d-flex align-items-center gap-2 mb-4"
    (click)="volver()"
    style="cursor: pointer;"
  >

    <span class="material-symbols-outlined">
      arrow_back
    </span>

    <span class="fw-semibold">
      Volver a la carta
    </span>

  </div>

  <!-- TITULO -->
  <h2 class="fw-bold mb-4">
    Mi pedido
  </h2>

  <!-- CARD PLATOS -->
  <div
    *ngFor="let plato of pedidos; let i = index"
    class="card border-0 shadow-sm rounded-4 p-3 mb-4"
  >

  <div class="d-flex justify-content-end">

  <span
    class="material-symbols-outlined text-dark"
    style="cursor: pointer;"
   (click)="eliminarPedido(i)"
  >
    close
  </span>

</div>

    <!-- TITULO Y PRECIO -->
    <div class="d-flex justify-content-between align-items-center mb-3">

      <h4 class="fw-bold mb-0">
        {{plato.nombre}}
      </h4>

      <span class="fw-bold fs-5">
        $ {{plato.precioVenta}}
      </span>

    </div>

    <!-- IMAGEN -->
    <img
      [src]="plato.imagen"
      class="img-fluid rounded-4 mb-3"
      style="height: 220px; object-fit: cover;"
    >

    <!-- DESCRIPCION -->
  <p class="text-muted mb-4">

  {{plato.descripcion}}

</p>

    <!-- BOTONES -->
    <div class="d-flex flex-column gap-2">

      <app-boton
        variant="add"
       customClass="w-100"
      >

        <span class="material-symbols-outlined">
    add
  </span>

  <span>
    Agregar pedido
  </span>

      </app-boton>

      <app-boton
        variant="edit"
        customClass="w-100"
      >

        Personalizar

      </app-boton>

    </div>

  </div>

</div>
