<app-header-comensal [showBack]="true" backRoute="/comensal/ver-carta" [title]="''" />

<div class="container-fluid p-3 bg-light min-vh-100 pedido-detalle-container">

  @if (detalle) {
    @if (detalle.urlImagen) {
      <div class="plato-detalle-img-wrapper">
        <img [src]="detalle.urlImagen" class="plato-detalle-img">
      </div>
    } @else {
      <div class="plato-detalle-placeholder mb-3">
        <span class="material-symbols-outlined">restaurant</span>
      </div>
    }

    <div class="d-flex justify-content-between align-items-start mb-1">
      <h2 class="plato-detalle-nombre">{{ detalle.nombre }}</h2>
      <span class="plato-detalle-precio">$ {{ detalle.precio | number:'1.0-0' }}</span>
    </div>
    <p class="plato-detalle-descripcion">{{ detalle.descripcion }}</p>

    <div class="d-flex justify-content-end align-items-center gap-3 mb-4">
      <div class="cantidad-pill">
        <button class="btn-cant-pill" (click)="decrementar()">−</button>
        <span class="cant-pill-valor">{{ cantidad() }}</span>
        <button class="btn-cant-pill" (click)="incrementar()">+</button>
      </div>
    </div>

    <div class="pedido-actions">
      <app-boton-comensal [backgroundColor]="configuracionVisualState.colorSecundario()" [textColor]="'#ffffff'"
        (clicked)="agregarAlPedido()">
        <div class="d-flex align-items-center justify-content-center gap-2">
          <span class="material-symbols-outlined">add</span>
          <span>Agregar al pedido</span>
        </div>
      </app-boton-comensal>

      <app-boton-comensal backgroundColor="#ffffff" textColor="#000000" [tieneBorde]="true" (clicked)="irAPersonalizar()">
        <div class="d-flex align-items-center justify-content-center gap-2">
          <span class="material-symbols-outlined">tune</span>
          <span>Personalizar</span>
        </div>
      </app-boton-comensal>
    </div>
  } @else {
    <div class="text-center py-5">
      <div class="spinner-border" role="status" style="color:var(--color-primario);"></div>
    </div>
  }

</div>

<app-llamar-al-mozo [mesaId]="comandaState.mesaId() ?? 0" [enviando]="comensalState.enviando()"
  [enviado]="comensalState.exito()" [error]="comensalState.error()" (llamadoMozo)="comensalState.solicitarMozo($event)"
  (modalCerrado)="comensalState.limpiarEstado()" />
