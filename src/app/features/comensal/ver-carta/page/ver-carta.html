<div class="carta-container">

  <!-- Header: Logo + Info Mesa -->
  <div class="header-top">
    <div class="logo-container">
      <img [src]="logoUrl()" alt="Logo" class="logo-img" />
    </div>
    <div class="mesa-info-container">
      <div class="badge-info">
        <span class="material-symbols-outlined">person</span>
        <span>{{ cantidadPersonas() }}</span>
      </div>
      <div class="badge-info">Mesa 8</div>
    </div>
  </div>

  <!-- Buscador + Filtro -->
  <div class="search-row">
    <div class="buscador-wrapper">
      <app-buscador placeholder="Buscar en EL FERROVIARIO" (busquedaCambiada)="onSearch($event)" />
    </div>
    <button class="btn-filtro-icono" (click)="mostrarFiltros.set(true)">
      <span class="material-symbols-outlined">filter_alt</span>
    </button>
  </div>


  <div class="platos-lista-container">
    @if (state.cargando()) {
      <p class="text-center text-muted py-5">Cargando carta...</p>
    } @else {
      <app-lista-platos-comensal
        [platos]="state.itemsFiltrados()"
        (agregarPedido)="agregarAlPedido($event)" />
    }
  </div>

</div>

@if (mostrarFiltros()) {
  <app-filtros-carta-overlay (cerrar)="mostrarFiltros.set(false)" />
}

<app-comensal-footer-cart
  [cantidadItems]="cantidadTotalPedido()"
  [total]="totalPedido()"
  [configuracion]="configuracion"
  (verPedido)="irAPedido()" />
