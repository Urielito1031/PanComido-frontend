<div class="container-fluid p-3 bg-light min-vh-100">

  <!-- HEADER -->
  <div class="d-flex justify-content-between align-items-center mb-3">

    <div class="d-flex align-items-center gap-2">

      <img 
        
      >

    </div>

    <div class="d-flex align-items-center gap-3">

      <div class="d-flex align-items-center gap-1">
        <span class="material-symbols-outlined">
          person
        </span>

        <span class="fw-semibold">
          4
        </span>
      </div>

      <div class="fw-semibold">
        Mesa: 12
      </div>

    </div>

  </div>

  <!-- BUSCADOR -->
<div class="d-flex gap-2 mb-4">

  <!-- BUSCADOR -->
  <div class="flex-grow-1">

    <app-buscador
      placeholder="Buscar plato"
      (busquedaCambiada)="onSearch($event)">
    </app-buscador>

  </div>

  <!-- FILTRO -->
<button class="btn btn-light shadow-sm rounded-3 px-3">

 <fa-icon [icon]="faFilter"></fa-icon>

</button>

</div>

  <!-- BOTONES -->
<div class="d-flex mb-4 justify-content-between gap-3">

  <div>

    <app-boton
      variant="teal"
      (click)="irAPedido()"
      label="Pedido">

      Pedido

    </app-boton>

  </div>

  <div>

    <app-boton
      variant="orange"
      label="Ordenar">

      Ordenar

    </app-boton>

  </div>

</div>
  <!-- LISTA -->
  <app-lista-platos-comensal
    [platos]="filteredPlatos"
    (agregarPedido)="agregarAlPedido($event)">
  </app-lista-platos-comensal>

</div>
