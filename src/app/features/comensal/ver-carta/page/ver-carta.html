<div class="header-top">
  <div class="header-top-inner">
    <div class="logo-container">
      <img [src]="configuracionVisualState.logoUrl()" alt="Logo" class="logo-img" />
    </div>
    <div class="mesa-info-container">
      
      <div class="badge-info">
        <span class="material-symbols-outlined">person</span>
        <span>{{ cantidadPersonas() }}</span>
      </div>
      <div class="badge-info">Mesa {{ mesaId() }}</div>
      <div class="invite-btn" (click)="abrirCompartir()" title="Invitar a la mesa">
        <span class="material-symbols-outlined">group_add</span>
      </div>
    </div>
  </div>
</div>

@if (popupAbierto()) {
  <div class="overlay" (click)="cerrarCompartir()">
    <div class="popup" (click)="$event.stopPropagation()">
      <div class="popup-header">
        <h3 class="popup-title">Compartir mesa</h3>
        <div class="popup-close" (click)="cerrarCompartir()">✕</div>
      </div>
      <div class="popup-body">
        <qrcode [qrdata]="urlInvitacion()" [width]="200"></qrcode>
        <p class="popup-desc">Compartí este enlace para que otros se unan a tu mesa:</p>
        <div class="popup-link">{{ urlInvitacion() }}</div>
        <button class="popup-copy" (click)="copiarEnlace()">Copiar enlace</button>
      </div>
    </div>
  </div>
}

<div class="carta-container">

  
  <div class="search-row">
    <div class="buscador-wrapper">
      <app-buscador [placeholder]="'Buscar en ' + configuracionVisualState.nombreLocal()" (busquedaCambiada)="onSearch($event)" />
    </div>
    <button class="btn-filtro-icono" (click)="mostrarFiltros.set(true)">
      <span class="material-symbols-outlined">filter_alt</span>
      @if (state.cantidadFiltrosActivos() > 0) {
      <span class="filtro-badge">{{ state.cantidadFiltrosActivos() }}</span>
      }
    </button>
  </div>
  <!-- Dropdown Ordenar -->
  <div class="ordenar-section">
    <div class="dropdown-ordenar">
      <button class="dropdown-trigger" [class.abierto]="menuOrdenarAbierto()" (click)="toggleMenuOrdenar()">
        <span class="material-symbols-outlined icon-ordenar">sort</span>
        <span class="label-ordenar">{{ ordenSeleccionado() || 'Ordenar' }}</span>
      </button>

      @if (menuOrdenarAbierto()) {
      <div class="dropdown-menu">
        <button class="dropdown-item" (click)="seleccionarOrden('', 'Predeterminado')">
          Orden predeterminado
        </button>
        <button class="dropdown-item" (click)="seleccionarOrden('precio-menor', 'Menor precio')">
          Menor precio
        </button>
        <button class="dropdown-item" (click)="seleccionarOrden('precio-mayor', 'Mayor precio')">
          Mayor precio
        </button>
        <button class="dropdown-item" (click)="seleccionarOrden('tiempo', 'Más rápidos')">
          Más rápidos
        </button>
        <button class="dropdown-item" (click)="seleccionarOrden('nombre', 'A-Z')">
          A-Z
        </button>
      </div>
      }
    </div>
  </div>

  
  <div class="platos-lista-container">
    @if (state.cargando()) {
    <p class="text-center text-muted py-5">Cargando carta...</p>
    } @else {
    <app-lista-platos-comensal [items]="state.itemsFiltrados()" (agregarPedido)="agregarAlPedido($event)" />
    }
  </div>

</div>

@if (mostrarFiltros()) {
<app-filtros-carta-overlay (cerrar)="mostrarFiltros.set(false)" (toggleTipo)="state.toggleTipoPlato($event)"
  (limpiar)="state.limpiarFiltros()" />
}


<app-comensal-footer-cart [cantidadItems]="cantidadTotalPedido()" [total]="totalPedido()"
  (verPedido)="irAPedido()" [mesaId]="mesaId()" [enviando]="comensalState.enviando()"
  [enviado]="comensalState.exito()" [error]="comensalState.error()" (llamadoMozo)="comensalState.solicitarMozo($event)"
  (modalCerrado)="comensalState.limpiarEstado()" />
