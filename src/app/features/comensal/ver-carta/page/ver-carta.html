<div class="carta-container">

  <div class="header-top">
    <div class="logo-container">
      <img [src]="logoUrl()" alt="Logo" class="logo-img" />
    </div>
    <div class="mesa-info-container">
      <div class="badge-info">
        <span class="material-symbols-outlined">person</span>
        <span>{{ cantidadPersonas() }}</span>
      </div>
      <div class="badge-info">Mesa: 12</div>
    </div>
  </div>

  <div class="search-row">
    <div class="buscador-wrapper">
      <app-buscador placeholder="Buscar en EL FERROVIARIO" (busquedaCambiada)="onSearch($event)" />
    </div>
    <button class="btn-filtro-icono" (click)="mostrarFiltros.set(true)">
      <span class="material-symbols-outlined">filter_alt</span>
    </button>
  </div>

  <div class="actions-row">
    <div class="action-btn-wrapper">
      <app-boton-comensal
        [backgroundColor]="'#2E7D32'" 
        [textColor]="'#FFFFFF'"
        (clicked)="irAPedido()">
        <span class="d-flex align-items-center justify-content-center gap-2 font-weight-bold">
          <span class="material-symbols-outlined">edit_document</span>
          <span>Pedido ({{ cantidadTotalPedido }})</span>
        </span>
      </app-boton-comensal>
    </div>
    
   <div class="action-btn-wrapper">
  <div class="dropdown-ordenar">
    <button class="dropdown-trigger" (click)="toggleMenuOrdenar()">
      <span class="material-symbols-outlined">sort</span>
      <span>{{ ordenSeleccionado() || 'Ordenar' }}</span>
    </button>

    @if (menuOrdenarAbierto()) {
      <div class="dropdown-menu">
        <button class="dropdown-item" (click)="seleccionarOrden('precio-menor', 'Menor precio')">
          Menor precio
        </button>
        <button class="dropdown-item" (click)="seleccionarOrden('precio-mayor', 'Mayor precio')">
          Mayor precio
        </button>
        <button class="dropdown-item" (click)="seleccionarOrden('tiempo', 'Más rápidos')">
          Más rápidos
        </button>
        <button class="dropdown-item" (click)="seleccionarOrden('nombre', 'A-Z')">
          A-Z
        </button>
      </div>
    }
  </div>
</div>
  </div>

  <div class="platos-lista-container">
    @if (state.cargando()) {
      <p class="text-center text-muted py-5">Cargando carta...</p>
    } @else {
      <app-lista-platos-comensal
        [platos]="state.itemsFiltrados()"
        (agregarPedido)="agregarAlPedido($event)" />
    }
  </div>

</div>

@if (mostrarFiltros()) {
  <div class="filtros-overlay">
    </div>
}

<app-llamar-al-mozo [configuracion]="configuracion" />
