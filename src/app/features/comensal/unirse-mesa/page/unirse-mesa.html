<div class="container">

  <h2>Te estás uniendo a la Mesa {{ datosMesa?.numeroMesa }}</h2>

  <p>Restaurante: {{ datosMesa?.nombreRestaurante }}</p>



  <input
    type="text"
    placeholder="Tu nombre"
    (input)="nombre.set($any($event.target).value)"
  />

  <app-boton-comensal [backgroundColor]="configuracion.paleta.botonSecundario"
            [textColor]="configuracion.paleta.textoOscuro"   (click)="unirse()">
    Unirme a la mesa
  </app-boton-comensal>

</div>
