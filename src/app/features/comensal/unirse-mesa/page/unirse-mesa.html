@if (mesaComensalState.cargando()) {
  <div class="unirse-card">
    <p class="unirse-text">Cargando información de la mesa...</p>
  </div>
} @else if (mesaComensalState.tieneError()) {
  <div class="unirse-card">
    <h1 class="unirse-title">Error</h1>
    <p class="unirse-text">{{ mesaComensalState.error() }}</p>
  </div>
} @else {
  <div class="unirse-card">

    <h1 class="unirse-title">
      Te estás uniendo a la Mesa
    </h1>

    <div class="unirse-number">
      {{ mesaComensalState.numeroMesaInvitado() }}
    </div>

    <input
      class="unirse-input"
      type="text"
      placeholder="Tu nombre"
      (input)="nombre.set($any($event.target).value)"
    />

    <app-boton-comensal
      [backgroundColor]="configuracionVisualState.colorPrimario()"
      [textColor]="'#FFFFFF'"
      (click)="unirse()">
      Unirme a la mesa
    </app-boton-comensal>

  </div>
}
