<div class="personalizar-container">

  <!-- Header con botón volver -->
  <header class="personalizar-header">
    <button class="btn-volver" (click)="volver()">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>
    <div class="header-info">
      <div class="logo-container">
        <img src="assets/images/logo/logo_el_ferroviario.png" alt="Logo" class="logo-img" />
      </div>
      <div class="badge-pedido">
        <span class="material-symbols-outlined">edit_document</span>
        <span>Pedido</span>
      </div>
    </div>
  </header>

  <!-- Content Card -->
  <div class="content-card">
    <!-- Título y precio -->
    <div class="plato-header">
      <h2 class="plato-nombre">{{ plato?.plato?.nombre }}</h2>
      <span class="plato-precio">$ {{ plato?.plato?.precio | number:'1.0-0' }}</span>
    </div>

    <!-- Hero Image -->
    <div class="plato-image-wrapper">
      @if (plato?.plato?.urlImagen) {
        <img [src]="plato.plato.urlImagen" class="plato-image" [alt]="plato.plato.nombre">
      } @else {
        <div class="plato-image-placeholder">
          <span class="material-symbols-outlined">restaurant</span>
        </div>
      }
    </div>

    <!-- Descripción -->
    <div class="plato-descripcion-box">
      <p class="plato-descripcion">
        {{ plato?.plato?.descripcion || 'Deliciosa preparación del chef.' }}
      </p>
    </div>
  </div>

  <!-- Botones de Acción -->
  <div class="action-buttons">
    <button class="btn-accion btn-agregar" (click)="guardarCambios()">
      + Agregar al pedido
    </button>
    <button class="btn-accion btn-personalizar">
      Personalizar
    </button>
  </div>

</div>


<app-llamar-al-mozo [configuracion]="configuracion" #llamarMozoRef />
