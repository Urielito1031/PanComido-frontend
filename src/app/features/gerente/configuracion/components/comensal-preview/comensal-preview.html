<div class="mobile-frame" [style.font-family]="fontCuerpo()">
  <div class="notch"></div>

  <div class="mobile-content">
    <!-- Encabezado superior -->
    <div class="header d-flex justify-content-between align-items-center" [style.background-color]="colorPrimario()">
      <div class="logo-container">
        @if (datosLocal().imagen) {
        <img [src]="logo()" alt="Logo local" class="header-logo" />
        } @else {
        <!-- Logo por defecto si no subieron uno -->
        <div class="mock-logo">
          <i class="bi bi-shop text-white"></i>
        </div>
        }
      </div>
      <div class="user-info d-flex align-items-center bg-white px-2 py-1 rounded-pill">
        <span class="material-symbols-outlined me-1" style="color: #333; font-size: 1.1rem;">person</span>
        <span class="fw-bold me-2" style="font-size: 0.8rem; color: #333;">2</span>
        <span style="font-size: 0.8rem; color: #666;">Mesa <span class="fw-bold text-dark">8</span></span>
      </div>
    </div>

    <div class="p-3 bg-light content-scroll">
      <!-- Barra de búsqueda -->
      <div class="d-flex mb-3 gap-2 align-items-center">
        <div class="search-bar flex-grow-1 bg-white border rounded d-flex align-items-center px-2 py-2"
          [style.border-color]="colorPrimario() + ' !important'">
          <span class="material-symbols-outlined text-muted me-2" style="font-size: 1.1rem;">search</span>
          <span class="text-muted" style="font-size: 0.85rem;">Buscar en {{ nombreLocal() }}</span>
        </div>
        <span class="material-symbols-outlined text-dark fs-4">filter_alt</span>
      </div>

      <!-- Botones principales -->
      <div class="row g-2 mb-3">
        <div class="col-6">
          <button class="btn w-100 rounded d-flex justify-content-center align-items-center gap-2 py-2 text-white"
            [style.background-color]="colorPrimario()">
            <span class="material-symbols-outlined">receipt_long</span>
            <span class="fw-bold" style="font-size: 0.9rem;">Pedido</span>
          </button>
        </div>
        <div class="col-6">
          <button class="btn w-100 rounded d-flex justify-content-center align-items-center gap-2 py-2 text-white"
            [style.background-color]="colorPrimario()">
            <span class="material-symbols-outlined">sort</span>
            <span class="fw-bold" style="font-size: 0.9rem;">Ordenar</span>
          </button>
        </div>
      </div>

      <!-- Lista de platos de prueba -->
      <div class="d-flex flex-column gap-3">
        @for (plato of platosMock; track plato.nombre) {
        <div class="card border-0 shadow-sm rounded-3 overflow-hidden bg-white">
          <div class="d-flex">
            <div class="img-wrapper" style="width: 110px; flex-shrink: 0;">
              <img [src]="plato.img" alt="{{plato.nombre}}" class="w-100 h-100 object-fit-cover">
            </div>
            <div class="p-2 d-flex flex-column justify-content-between w-100">
              <div>
                <h6 class="mb-1 fw-bold text-dark" [style.font-family]="fontTitulo()" style="font-size: 0.9rem;">{{
                  plato.nombre }}</h6>
                @if (plato.esPlatoDelDia) {
                <div class="badge mb-1 text-white" [style.background-color]="colorPrimario()">Plato del día</div>
                }
              </div>

              <div class="d-flex justify-content-between align-items-end mt-2">
                <div class="d-flex align-items-center text-dark">
                  <span style="font-size: 0.85rem;">⏱ {{ plato.tiempo }}</span>
                </div>
                <span class="fw-bold fs-6" [style.color]="colorSecundario()">{{ plato.precio }}</span>
              </div>

              <button class="btn w-100 mt-2 fw-bold d-flex justify-content-center align-items-center gap-1 text-white" 
                [style.background-color]="colorSecundario()"
                style="font-size: 0.85rem; padding: 4px 0;">
                <span class="material-symbols-outlined" style="font-size: 1.1rem;">add</span>
                Agregar
              </button>
            </div>
          </div>
        </div>
        }
      </div>
    </div>

    <!-- Footer simulado con el carrito y mozo -->
    <div class="comensal-footer-preview" [style.background-color]="colorSecundario()">
      <div class="footer-content-preview">
        
        <button class="cart-pill-btn-preview text-white" [style.background-color]="colorPrimario()">
          <div class="cart-pill-left-preview">
            <div class="cart-count-badge-preview">0</div>
            <span class="cart-label-preview">Ver pedido</span>
          </div>
          <span class="cart-total-preview fw-bold">$ 0</span>
        </button>

        <div class="mozo-wrapper-preview text-white" [style.background-color]="colorPrimario()">
          <span class="material-symbols-outlined" style="font-size: 1.5rem; margin-bottom: -2px;">room_service</span>
          <span class="fw-bold" style="font-size: 0.65rem;">Mozo</span>
        </div>

      </div>
    </div>
  </div>
</div>
