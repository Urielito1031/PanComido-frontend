<div class="card shadow-sm border-0 rounded-3 h-100">
  <div class="card-body p-4">
    @if (turnos().length === 0) {
      <p class="text-muted text-center py-3 mb-0">
        No hay turnos laborales configurados.
      </p>
    }

    @for (turno of turnos(); track turno.id) {
      <h6 class="fs-5 mb-3 text-dark mt-4" [class.mt-4]="!$first">
        {{ turno.esNocturno ? 'Turno noche' : 'Turno día' }}
      </h6>
        <div class="d-flex align-items-center gap-4">
          <div class="d-flex align-items-center gap-3">
            <span class="fw-bold fs-6">Apertura</span>
            <input
              type="time"
              class="form-control custom-time-input"
              step="60"
              [value]="turno.horarioInicio.slice(0, 5)"
              (change)="onCambio(turno.id, 'horarioInicio', $event)"
            />
          </div>
          <div class="d-flex align-items-center gap-3">
            <span class="fw-bold fs-6">Cierre</span>
            <input
              type="time"
              class="form-control custom-time-input"
              step="60"
              [value]="turno.horarioFin.slice(0, 5)"
              (change)="onCambio(turno.id, 'horarioFin', $event)"
            />
          </div>
        </div>
    }
  </div>
</div>
