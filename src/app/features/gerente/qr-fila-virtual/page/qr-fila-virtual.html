<div class="qr-container text-center p-4">
  <h2 class="mb-4 text-dark fw-bold">QR Fila Virtual</h2>
  <p class="text-muted mb-4 d-print-none">Imprimí este código QR y colocalo en la puerta de tu restaurante para que los clientes se anoten en la fila virtual escaneándolo con su celular.</p>
  
  <div class="qr-print-area d-flex justify-content-center p-4 mb-4 bg-white rounded shadow-sm mx-auto" style="max-width: 400px; border: 2px dashed #ccc;">
    <div class="text-center">
      <h3 class="mb-3 fw-bold">Pan Comido - Fila Virtual</h3>
      <qrcode [qrdata]="urlQr()" [width]="300" [errorCorrectionLevel]="'M'"></qrcode>
      <p class="mt-3 fw-bold text-muted">Escaneá para anotarte</p>
    </div>
  </div>

  <div class="d-print-none">
    <button class="btn btn-primary btn-lg fw-bold px-5 py-3" style="background-color: var(--color-primario, #D8081C); border-color: var(--color-primario, #D8081C);" (click)="imprimirQr()">
      Imprimir QR
    </button>
  </div>
</div>
