<div class="crear-plato-page p-4">
  <div class="row mb-4 header-section">
    <div class="col-12">
      <h1 class="page-title mb-1">Crear un plato</h1>
      <p class="page-subtitle text-muted mb-0">Registra tus platos en el sistema</p>
    </div>
  </div>

  <div class="row g-4 main-content-row">
    <!-- Left Column: Image & Visibility -->
    <div class="col-12 col-lg-2 text-center d-flex flex-column align-items-center gap-3">
      <div class="image-preview-card shadow-sm border p-2 bg-white w-100">
        @if (imagen()) {
          <img [src]="imagen()" class="dish-image-large img-fluid" alt="Vista previa del plato">
        } @else {
          <div class="image-placeholder d-flex flex-column align-items-center justify-content-center w-100">
            <span class="material-symbols-outlined placeholder-icon">add_a_photo</span>
            <span class="placeholder-text small mt-1">Sin imagen</span>
          </div>
        }
      </div>
      
      <app-boton 
        label="Editar foto" 
        variante="warning" 
        tamanio="md" 
        class="w-100 edit-photo-btn">
        <span class="material-symbols-outlined me-2 fs-5">edit</span>
      </app-boton>

      <div class="visibility-toggle-wrapper w-100 bg-white border p-3 rounded-3 shadow-sm d-flex justify-content-center">
        <app-toggle 
          [active]="visible()" 
          label="Visible en carta" 
          (toggled)="onToggleVisible()">
        </app-toggle>
      </div>
    </div>

    <!-- Middle Column: Form Inputs -->
    <div class="col-12 col-lg-5">
      <div class="form-card shadow-sm border p-4 bg-white rounded-3 h-100">
        <!-- Nombre -->
        <div class="mb-3">
          <label class="form-label font-bold">Nombre</label>
          <input 
            type="text" 
            class="form-control custom-input" 
            [ngModel]="nombre()" 
            (ngModelChange)="nombre.set($event)">
        </div>

        <!-- Costo & Venta side-by-side -->
        <div class="row g-3 mb-3">
          <div class="col-6">
            <label class="form-label font-bold">Costo</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input 
                type="number" 
                class="form-control custom-input border-start-0" 
                [ngModel]="costo()" 
                (ngModelChange)="costo.set($event)">
            </div>
          </div>
          <div class="col-6">
            <label class="form-label font-bold">Venta</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input 
                type="number" 
                class="form-control custom-input border-start-0" 
                [ngModel]="precioVenta()" 
                (ngModelChange)="precioVenta.set($event)">
            </div>
          </div>
        </div>

        <!-- Tiempo de preparación -->
        <div class="mb-3">
          <label class="form-label font-bold">Tiempo de preparación</label>
          <div class="input-group">
            <span class="input-group-text">
              <span class="material-symbols-outlined text-muted">schedule</span>
            </span>
            <input 
              type="number" 
              class="form-control custom-input border-start-0" 
              [ngModel]="tiempoPreparacion()" 
              (ngModelChange)="tiempoPreparacion.set($event)">
            <span class="input-group-text bg-white border-start-0 text-muted">minutos</span>
          </div>
        </div>

        <!-- Tipo de plato -->
        <div class="mb-3">
          <label class="form-label font-bold">Tipo de plato</label>
          <div class="select-wrapper">
            <select 
              class="form-select custom-input" 
              [ngModel]="tipoPlato()" 
              (ngModelChange)="tipoPlato.set($event)">
              <option value="" disabled selected>Seleccione tipo...</option>
              <option value="Entrada">Entrada</option>
              <option value="Plato Principal">Plato Principal</option>
              <option value="Postre">Postre</option>
              <option value="Bebida">Bebida</option>
            </select>
          </div>
        </div>

        <!-- Descripción -->
        <div class="mb-4">
          <label class="form-label font-bold">Descripción</label>
          <textarea 
            class="form-control custom-input custom-textarea" 
            rows="4" 
            [ngModel]="descripcion()" 
            (ngModelChange)="descripcion.set($event)">
          </textarea>
        </div>

        <!-- Diet Tags -->
        <div class="d-flex flex-wrap gap-2 justify-content-start">
          <button 
            type="button" 
            class="diet-tag-btn" 
            [class.active]="vegano()" 
            (click)="toggleTag('vegano')">
            VEGANO
          </button>
          <button 
            type="button" 
            class="diet-tag-btn" 
            [class.active]="vegetariano()" 
            (click)="toggleTag('vegetariano')">
            VEGETARIANO
          </button>
          <button 
            type="button" 
            class="diet-tag-btn" 
            [class.active]="celiaco()" 
            (click)="toggleTag('celiaco')">
            CELÍACO
          </button>
        </div>
      </div>
    </div>

    <!-- Right Column: Recipe Details -->
    <div class="col-12 col-lg-5">
      <app-detalle-receta 
        (recetaCambiada)="onRecetaCambiada($event)">
      </app-detalle-receta>
    </div>
  </div>

  <!-- Bottom Page Actions Footer -->
  <div class="row mt-4">
    <div class="col-12 d-flex justify-content-end gap-3 footer-actions">
      <app-boton 
        label="GUARDAR" 
        variante="success" 
        tamanio="lg" 
        (clicked)="guardar()"
        class="save-btn">
      </app-boton>
      <app-boton 
        label="CANCELAR" 
        variante="outline" 
        tamanio="lg" 
        (clicked)="cancelar()"
        class="cancel-btn">
      </app-boton>
    </div>
  </div>
</div>

@if (mostrarExito()) {
  <div class="modal-overlay">
    <div class="modal-card shadow border p-4 text-center bg-white">
      <div class="modal-success-icon mb-3">
        <span class="material-symbols-outlined success-icon">check_circle</span>
      </div>
      <h3 class="modal-title mb-2">¡Plato guardado con éxito!</h3>
      <p class="modal-text text-muted mb-4">El plato se ha registrado correctamente en el sistema y estará visible en la carta.</p>
      <div class="modal-action-btn">
        <app-boton 
          label="ACEPTAR" 
          variante="success" 
          tamanio="md" 
          (clicked)="cerrarExito()"
          class="w-100 save-btn">
        </app-boton>
      </div>
    </div>
  </div>
}
