<app-page-toolbar>
  
  <app-buscador 
    buscador 
    placeholder="Buscar ingrediente..."
    (busquedaCambiada)="termino.set($event)">
  </app-buscador>

  <app-dropdown filtros #filtroDropdown>

    <app-boton 
      trigger
      [label]="categoria() || 'Categorías'"
      variante="teal" 
      tamanio="md">
    </app-boton>
    
    <div menu>
      <ul>
        <li (click)="categoria.set(''); filtroDropdown.cerrar()">Todos</li>
        <li (click)="categoria.set('Verdura'); filtroDropdown.cerrar()">Verduras</li>
        <li (click)="categoria.set('Carne'); filtroDropdown.cerrar()">Carnes</li>
        <li (click)="categoria.set('Lacteo'); filtroDropdown.cerrar()">Lácteos</li>
        <li (click)="categoria.set('Bebida'); filtroDropdown.cerrar()">Bebidas</li>
        <li (click)="categoria.set('Almacen'); filtroDropdown.cerrar()">Almacén</li>

      </ul>
    </div>
  </app-dropdown>

  <app-boton 
    acciones
    label="NUEVO PRODUCTO" 
    variante="secondary" 
    tamanio="md"
    (clicked)="abrirModalCrear(modalFormulario)">
  </app-boton>
  
</app-page-toolbar>

<div class="stock-list-container">
  <div class="stock-list-button">
    <app-boton label="Productos" variante="tab" tamanio="md" [activo]="tabSeleccionada() === 'productos'" (clicked)="tabSeleccionada.set('productos')"></app-boton>
    <app-boton label="Bodegas" variante="tab" [activo]="tabSeleccionada() === 'bodegas'" (clicked)="tabSeleccionada.set('bodegas')"></app-boton>
    <app-boton label="Lotes" variante="tab" [activo]="tabSeleccionada() === 'lotes'" (clicked)="tabSeleccionada.set('lotes')"></app-boton>
  </div>

  <app-insumo-list 
    [productos]="productosFiltrados()"
    (editar)="abrirModalEditar(modalFormulario, $event)">
  </app-insumo-list>
</div>

 <!-- ?ESTO ES NECESARIO PARA RENDERIZAR EL MODAL EN LA VISTA -->
<app-modal #modalFormulario [titulo]="tituloModal()" (cerrado)="cerrarYLimpiar(modalFormulario)">
   </app-modal>
