<div class="panel-overlay" (click)="onClose()">
  <div class="side-panel shadow-lg bg-white" (click)="$event.stopPropagation()">

    <div class="panel-header d-flex justify-content-between align-items-center p-3 border-bottom">
      <h3 class="fw-bold fs-5 mb-0 d-flex align-items-center gap-2 text-dark">
        <span class="material-symbols-outlined text-secondary">local_bar</span>
        Editar Bebida
      </h3>
      <button class="btn-close-panel" (click)="onClose()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <div class="panel-body p-4 d-flex flex-column flex-grow-1 overflow-auto">
      @if (bebida().detalle; as detalle) {
        <app-editar-bebida-form
          [insumo]="detalle"
          [costo]="bebida().costo"
          [porcentajeGanancia]="porcentajeGanancia()"
          [error]="error()"
          (guardar)="guardar.emit($event)"
          (cancelado)="onClose()">
        </app-editar-bebida-form>
      } @else {
        <div class="text-center text-muted p-5">Cargando...</div>
      }
    </div>

  </div>
</div>
