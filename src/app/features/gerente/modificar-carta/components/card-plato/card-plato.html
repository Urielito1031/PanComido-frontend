<div class="card h-100 border-0 shadow-sm p-3 dish-card" [class.disabled-card]="!plato().visible">
  <div class="d-flex flex-column flex-sm-row align-items-center gap-3 h-100">
    <div class="flex-shrink-0 text-center">
      <img [src]="plato().imagen" class="dish-img rounded-3 object-fit-cover" [alt]="plato().nombre">
    </div>
    
    <div class="flex-grow-1 min-w-0 text-center text-sm-start">
      <h5 class="fw-bold mb-2 text-dark text-truncate">{{ plato().nombre }}</h5>
      <p class="mb-1 text-muted small">Precio de venta: <span class="fw-bold text-dark fs-6">$ {{ plato().precioVenta | number }}</span></p>
      <p class="mb-2 text-muted small">Costo: <span class="text-dark">$ {{ plato().costo | number }}</span></p>
      
      <div class="d-flex justify-content-center justify-content-sm-start">
        <app-toggle 
          [active]="plato().visible" 
          label="Visible en carta" 
          (toggled)="onToggle()">
        </app-toggle>
      </div>
    </div>

    <div class="d-flex flex-row flex-sm-column gap-2 mt-2 mt-sm-0 flex-shrink-0 justify-content-center">
      <app-boton variante="warning" tamanio="md" class="btn-icon">
        <span class="material-symbols-outlined fs-5">edit</span>
      </app-boton>
      <app-boton variante="danger" tamanio="md" class="btn-icon">
        <span class="material-symbols-outlined fs-5">delete</span>
      </app-boton>
    </div>
  </div>
</div>
