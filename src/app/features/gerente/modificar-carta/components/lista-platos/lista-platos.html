@if (layoutMode() === 'grid') {
  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4">
    @for (plato of platos(); track plato.id) {
      <div class="col mb-4">
        <app-card-plato 
          [plato]="plato"
          [porcentajesPlatos]="porcentajesPlatos()"
          [layoutMode]="'grid'"
          [isExploding]="plato.id === explodingId()"
          (toggleVisible)="onToggleVisible($event)"
          (editPlato)="onEditPlato($event)"
          (deletePlato)="onDeletePlato($event)"
          (toggleRecomendado)="onToggleRecomendado($event)">
        </app-card-plato>
      </div>
    } @empty {
      <div class="col-12 text-center py-4 text-muted">
        No hay platos disponibles en este momento.
      </div>
    }
  </div>
} @else {
  <div class="row row-cols-1 row-cols-xxl-2 g-3">
    @for (plato of platos(); track plato.id) {
      <div class="col">
        <app-card-plato 
          [plato]="plato"
          [porcentajesPlatos]="porcentajesPlatos()"
          [layoutMode]="'list'"
          [isExploding]="plato.id === explodingId()"
          (toggleVisible)="onToggleVisible($event)"
          (editPlato)="onEditPlato($event)"
          (deletePlato)="onDeletePlato($event)"
          (toggleRecomendado)="onToggleRecomendado($event)">
        </app-card-plato>
      </div>
    } @empty {
      <div class="col-12 text-center py-4 text-muted">
        No hay platos disponibles en este momento.
      </div>
    }
  </div>
}
