<div class="row row-cols-1 row-cols-xl-2 g-4">
  @for(plato of platos(); track plato.id) {
    <div class="col">
      <app-card-plato 
        [plato]="plato" 
        (toggleVisible)="onToggleVisible($event)"
        (editar)="editar.emit($event)"
        >
      </app-card-plato>
    </div>

  }
</div>
