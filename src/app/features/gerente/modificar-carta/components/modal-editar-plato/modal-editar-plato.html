<div class="modal-overlay" (click)="onClose()">
  <div class="modal-card shadow border p-4 bg-white" (click)="$event.stopPropagation()">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 class="modal-title m-0">Editar plato</h3>
      <button class="btn-close-custom" (click)="onClose()">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>

    <div class="row g-3">
      <div class="col-12 col-sm-4 text-center d-flex flex-column align-items-center gap-2">
        <div class="image-preview-card border p-2 bg-white">
          <ng-container *ngIf="imagen(); else noImage">
            <img [src]="imagen()" class="dish-image-large img-fluid" alt="Vista previa">
          </ng-container>
          <ng-template #noImage>
            <div class="image-placeholder d-flex flex-column align-items-center justify-content-center">
              <span class="material-symbols-outlined placeholder-icon">add_a_photo</span>
              <span class="placeholder-text small mt-1">Sin imagen</span>
            </div>
          </ng-template>
        </div>

        <div class="visibility-toggle-wrapper bg-white border p-2 rounded-3 w-100 d-flex justify-content-center">
          <app-toggle 
            [active]="visible()" 
            label="Visible" 
            (toggled)="onToggleVisible()">
          </app-toggle>
        </div>
      </div>

      <div class="col-12 col-sm-8">
        <div class="mb-3">
          <label class="form-label font-bold">Nombre</label>
          <input 
            type="text" 
            class="form-control custom-input" 
            [ngModel]="nombre()" 
            (ngModelChange)="nombre.set($event)">
        </div>

        <div class="row g-2 mb-3">
          <div class="col-6">
            <label class="form-label font-bold text-muted">Costo</label>
            <div class="input-group">
              <span class="input-group-text bg-light text-muted border-end-0">$</span>
              <input 
                type="number" 
                class="form-control custom-input bg-light text-muted border-start-0" 
                [ngModel]="costo()" 
                readonly>
            </div>
          </div>
          <div class="col-6">
            <label class="form-label font-bold">Venta</label>
            <div class="input-group">
              <span class="input-group-text">$</span>
              <input 
                type="number" 
                class="form-control custom-input border-start-0" 
                [ngModel]="precioVenta()" 
                (ngModelChange)="precioVenta.set($event)">
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label font-bold">URL de imagen</label>
          <input 
            type="text" 
            class="form-control custom-input" 
            [ngModel]="imagen()" 
            (ngModelChange)="imagen.set($event)">
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-end gap-3 mt-4">
      <app-boton 
        label="CANCELAR" 
        variante="outline" 
        tamanio="md" 
        (clicked)="onClose()"
        class="cancel-btn">
      </app-boton>
      <app-boton 
        label="GUARDAR" 
        variante="success" 
        tamanio="md" 
        (clicked)="onSave()"
        class="save-btn"
        [disabled]="!nombre().trim() || precioVenta() === null || costo() === null">
      </app-boton>
    </div>
  </div>
</div>
