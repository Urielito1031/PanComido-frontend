<div class="container-fluid p-4 bg-light min-vh-100">
  
  <app-page-toolbar>
    
    <app-buscador 
      buscador 
      placeholder="Buscar plato" 
      (busquedaCambiada)="onSearch($event)">
    </app-buscador>
   <app-dropdown filtros>

     <app-boton 
     trigger
     acciones
     label="Categorías" 
     variante="teal" 
     tamanio="md">
    </app-boton>
    <div menu>
      <ul>
        <li (click)="onCategoriaSeleccionada('Entradas')">Entradas</li>
      <li (click)="onCategoriaSeleccionada('Principales')">Principales</li>
      <li (click)="onCategoriaSeleccionada('Bebidas')">Bebidas</li>
      </ul>
    </div>
    
  </app-dropdown>
   
 <app-boton 
      acciones
      label="Nuevo plato" 
      variante="secondary" 
      tamanio="md">
    </app-boton>


  </app-page-toolbar>

  <app-lista-platos 
    [platos]="filteredPlatos" 
    (toggleVisible)="toggleVisibility($event)"
    (editar)="abrirModalEditar(modalFormulario,$event)">
  </app-lista-platos>
  
</div>
<app-modal 
  #modalFormulario 
  [titulo]="tituloModal" 
  [maxWidth]="tamanioMaximo" 
  (cerrado)="cerrarYLimpiar(modalFormulario)">
  
  @if (platoEditandoId() !== null && platoEditandoId() !== undefined) {
    <app-form-plato-editar 
      [plato]="platoSeleccionado()" 
      [categorias]="categorias"
      (cancelar)="cerrarYLimpiar(modalFormulario)"
      (guardar)="guardarPlato($event, modalFormulario)">
    </app-form-plato-editar>
  }

</app-modal>
