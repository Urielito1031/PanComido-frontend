<div class="container-fluid p-4 bg-light min-vh-100">
  
  <app-page-toolbar>
    
    <app-buscador 
      buscador 
      placeholder="Buscar plato" 
      (busquedaCambiada)="onSearch($event)">
    </app-buscador>
   <app-dropdown filtros>

     <app-boton 
     trigger
     acciones
     label="Categorías" 
     variante="teal" 
     tamanio="md">
    </app-boton>
    <div menu>
      <ul>
        <li (click)="onCategoriaSeleccionada('Entradas')">Entradas</li>
      <li (click)="onCategoriaSeleccionada('Principales')">Principales</li>
      <li (click)="onCategoriaSeleccionada('Bebidas')">Bebidas</li>
      </ul>
    </div>
    
  </app-dropdown>
   
 <app-boton 
      acciones
      label="Nuevo plato" 
      variante="secondary" 
      tamanio="md"
      (clicked)="irACrearPlato()">
    </app-boton>


  </app-page-toolbar>

  <app-lista-platos 
    [platos]="filteredPlatos()" 
    [explodingId]="explodingPlatoId()"
    (toggleVisible)="toggleVisibility($event)"
    (editPlato)="onEditPlato($event)"
    (deletePlato)="onDeletePlato($event)">
  </app-lista-platos>

  @if (platoAEditar()) {
    @defer (on idle) {
      <app-modal-editar-plato
        [plato]="platoAEditar()!"
        (save)="onSavePlato($event)"
        (close)="onCloseModals()">
      </app-modal-editar-plato>
    }
  }

  @if (platoAEliminar()) {
    @defer (on idle) {
      <app-modal-eliminar-plato
        [plato]="platoAEliminar()!"
        (confirm)="onConfirmDelete()"
        (close)="onCloseModals()">
      </app-modal-eliminar-plato>
    }
  }
</div>
