<div class="reset-wrapper">
  <div class="reset-card">
    <h3 class="reset-title">Nueva Contraseña</h3>
    
    <div *ngIf="mensajeError" class="alert-danger">
      {{ mensajeError }}
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" formControlName="contrasena" class="form-control" placeholder="Mínimo 8 caracteres">
        
        <div *ngIf="resetForm.get('contrasena')?.invalid && resetForm.get('contrasena')?.touched" class="text-danger">
          La contraseña debe tener mínimo 8 caracteres, 1 mayúscula, 1 número, 1 carácter especial y no puede contener comillas ni punto y coma.
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Repetir Contraseña</label>
        <input type="password" formControlName="repetirContrasena" class="form-control" placeholder="Repetir contraseña">
        
        <div *ngIf="resetForm.hasError('mismatch') && resetForm.get('repetirContrasena')?.touched" class="text-danger">
          Las contraseñas no coinciden.
        </div>
      </div>
      <button type="submit" [disabled]="resetForm.invalid || enviando" class="btn-primary">
        {{ enviando ? 'Guardando...' : 'Guardar contraseña' }}
      </button>
    </form>
  </div>
</div>
