<div class="recuperar-wrapper">
  <div class="recuperar-card">
    <h3 class="recuperar-title">Recuperar Contraseña</h3>
    
    <div *ngIf="mensajeExito" class="alert-success">
      {{ mensajeExito }}
    </div>

    <form [formGroup]="recuperarForm" (ngSubmit)="onSubmit()" *ngIf="!mensajeExito">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" formControlName="email" class="form-control" placeholder="ejemplo@pancomido.com">
        <div *ngIf="recuperarForm.get('email')?.invalid && recuperarForm.get('email')?.touched" class="text-danger">
          Ingresá un email válido.
        </div>
      </div>
      <button type="submit" [disabled]="recuperarForm.invalid || enviando" class="btn-primary">
        {{ enviando ? 'Enviando...' : 'Enviar enlace' }}
      </button>

      <div class="login-link">
        <a routerLink="/login">Volver al Login</a>
      </div>
    </form>
  </div>
</div>
