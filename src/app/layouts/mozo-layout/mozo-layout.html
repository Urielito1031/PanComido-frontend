<div class="mozo-layout">
  <!-- Logo superior izquierdo (del mockup) -->
  <header class="mozo-header">
    <img src="assets/images/logo/iso-red.png" alt="PanComido" class="logo-icon">
    <button class="logout-btn" (click)="logout()" aria-label="Cerrar sesión">
      <fa-icon [icon]="faRightFromBracket"></fa-icon>
    </button>
  </header>

  <!-- Tab Navigation -->
  <app-mozo-tab-navigation></app-mozo-tab-navigation>

  <!-- Content Area -->
  <main class="mozo-content">
    <router-outlet></router-outlet>
  </main>
</div>
